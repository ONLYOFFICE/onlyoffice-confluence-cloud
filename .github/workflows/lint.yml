name: Lint

on:
  workflow_dispatch:
  pull_request:
    types: [opened, reopened]
    branches: [master, develop]
    paths:
      - '**/*.ts'
      - '**/*.tsx'
      - '**/*.yml'
  push:
    branches: [master, develop]
    paths:
      - '**/*.ts'
      - '**/*.tsx'
      - '**/*.yml'

permissions:
  contents: read

jobs:
  lint:
    name: Lint 
    runs-on: ubuntu-latest
    steps:
      - name: Code Checkout
        uses: actions/checkout@v4

      - name: Install NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install

      - name: Code Linting
        run: npm run eslint